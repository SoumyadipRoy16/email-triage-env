name: email-triage-env
version: "1.0.0"
description: >
  A real-world OpenEnv environment where an AI agent triages, prioritizes,
  and responds to realistic business emails across three progressive tasks:
  classification (easy), extraction (medium), and reply drafting (hard).

author: OpenEnv Hackathon Submission
license: MIT

entry_point:
  type: http
  host: "0.0.0.0"
  port: 8000
  endpoints:
    reset: POST /reset
    step:  POST /step
    state: GET  /state

tasks:
  - id: task_classify
    name: "Email Classification"
    difficulty: easy
    description: >
      Given a business email, classify its urgency level and category.
      Partial credit awarded for getting either urgency or category correct.
    max_steps: 1
    reward_range: [0.0, 1.0]

  - id: task_extract
    name: "Action Item Extraction"
    difficulty: medium
    description: >
      Given a business email, extract all action items and produce a
      structured summary. Scored on precision + recall of extracted items.
    max_steps: 2
    reward_range: [0.0, 1.0]

  - id: task_reply
    name: "Professional Email Reply"
    difficulty: hard
    description: >
      Given a business email, draft a complete professional reply that
      addresses all points raised. Scored on tone, completeness, and
      professionalism via LLM-as-judge grading.
    max_steps: 3
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  properties:
    email_id:
      type: string
      description: Unique identifier for the current email
    email_subject:
      type: string
      description: Subject line of the email
    email_body:
      type: string
      description: Full body text of the email
    email_sender:
      type: string
      description: Sender name and role
    task_type:
      type: string
      enum: [classify, extract, reply]
      description: Which task the agent must perform on this email
    task_instructions:
      type: string
      description: Detailed instructions for the current task
    feedback:
      type: string
      description: Feedback from the grader after a step (empty on first obs)
    score:
      type: number
      description: Running cumulative score for this episode
    step_number:
      type: integer
      description: Current step within the episode
    done:
      type: boolean
      description: Whether the episode is complete

action_space:
  type: object
  description: >
    A flexible action object. Fill only the fields relevant to the current task.
    Extra fields are ignored.
  properties:
    category:
      type: string
      enum: [billing, technical_support, sales_inquiry, hr_policy, legal, general_inquiry, complaint, partnership]
      description: "[task=classify] Email category"
    urgency:
      type: string
      enum: [critical, high, medium, low]
      description: "[task=classify] Urgency level"
    action_items:
      type: array
      items:
        type: string
      description: "[task=extract] List of discrete action items extracted"
    summary:
      type: string
      description: "[task=extract] Brief summary of the email"
    reply:
      type: string
      description: "[task=reply] Full text of the professional reply"

metadata:
  tags: [email, nlp, business, real-world, multi-task]
  python_requires: ">=3.10"
  framework: fastapi
  docker_image: email-triage-env:latest